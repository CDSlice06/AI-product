<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成语接龙 - AI 对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .current-status {
            font-size: 16px;
            opacity: 0.9;
        }

        .current-idiom {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            margin-top: 8px;
        }

        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-user {
            display: flex;
            justify-content: flex-end;
        }

        .message-ai {
            display: flex;
            justify-content: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 16px;
            line-height: 1.6;
        }

        .message-user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-ai .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .message-label {
            font-size: 12px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .message-user .message-label {
            color: #667eea;
            text-align: right;
        }

        .message-ai .message-label {
            color: #f5576c;
        }

        .idiom-display {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 3px;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }

        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .idiom-input {
            flex: 1;
            padding: 14px 20px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s;
            letter-spacing: 2px;
            text-align: center;
        }

        .idiom-input:focus {
            border-color: #667eea;
        }

        .idiom-input::placeholder {
            color: #aaa;
            letter-spacing: 1px;
        }

        .btn {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        .btn-send {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-send:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-restart {
            background: #f0f0f0;
            color: #666;
            width: 100%;
        }

        .btn-restart:hover {
            background: #e0e0e0;
        }

        .error-message {
            background: #ffe0e0;
            color: #d00;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .history-count {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 8px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px 20px;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 16px;
        }

        .tip {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>成语接龙</h1>
            <p class="current-status">当前接龙：</p>
            <p class="current-idiom" id="currentIdiom">等待开始...</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="empty-state" id="emptyState">
                <div class="icon">📜</div>
                <p>输入一个成语开始接龙吧</p>
            </div>
        </div>

        <div class="history-count" id="historyCount"></div>

        <div class="input-area">
            <div class="error-message" id="errorMessage"></div>
            <div class="input-row">
                <input
                    type="text"
                    class="idiom-input"
                    id="idiomInput"
                    placeholder="请输入四字成语"
                    maxlength="4"
                    autocomplete="off"
                >
                <button class="btn btn-send" id="sendBtn" onclick="sendIdiom()">发送</button>
            </div>
            <button class="btn btn-restart" onclick="restartGame()">重新开始</button>
            <p class="tip">提示：AI 将以当前成语的最后一个字开头接龙</p>
        </div>
    </div>

    <script>
        // 后端接口地址
        const API_BASE = window.location.origin;

        // DOM 元素
        const chatArea = document.getElementById('chatArea');
        const idiomInput = document.getElementById('idiomInput');
        const sendBtn = document.getElementById('sendBtn');
        const currentIdiomEl = document.getElementById('currentIdiom');
        const errorMessageEl = document.getElementById('errorMessage');
        const emptyState = document.getElementById('emptyState');
        const historyCount = document.getElementById('historyCount');

        // 加载初始状态
        async function loadStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                const data = await response.json();
                if (data.current_idiom) {
                    currentIdiomEl.textContent = data.current_idiom;
                }
                if (data.history && data.history.length > 0) {
                    renderHistory(data.history);
                }
            } catch (error) {
                console.log('获取状态失败');
            }
        }

        // 显示错误
        function showError(message) {
            errorMessageEl.textContent = message;
            errorMessageEl.classList.add('show');
            setTimeout(() => {
                errorMessageEl.classList.remove('show');
            }, 3000);
        }

        // 渲染历史记录
        function renderHistory(history) {
            if (history.length === 0) {
                emptyState.style.display = 'block';
                historyCount.textContent = '';
                return;
            }
            emptyState.style.display = 'none';
            chatArea.innerHTML = '';

            history.forEach(record => {
                addMessage(record.user, true, false);
                addMessage(record.ai, false, false);
            });

            chatArea.scrollTop = chatArea.scrollHeight;
            updateHistoryCount();
        }

        // 添加消息
        function addMessage(idiom, isUser, scroll = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'message-user' : 'message-ai'}`;
            messageDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-label">${isUser ? '你' : 'AI'}</div>
                    <div class="idiom-display">${idiom}</div>
                </div>
            `;
            chatArea.appendChild(messageDiv);
            if (scroll) {
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }

        // 更新历史计数
        function updateHistoryCount() {
            const count = Math.floor(chatArea.querySelectorAll('.message-user').length);
            if (count > 0) {
                historyCount.textContent = `已接龙 ${count} 轮`;
            }
        }

        // 发送成语
        async function sendIdiom() {
            const idiom = idiomInput.value.trim();
            if (!idiom) {
                showError('请输入成语');
                return;
            }
            if (idiom.length !== 4) {
                showError('请输入四字成语');
                return;
            }

            sendBtn.disabled = true;
            sendBtn.textContent = '思考中...';

            try {
                const response = await fetch(`${API_BASE}/api/play`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idiom })
                });
                const data = await response.json();

                if (!data.success) {
                    showError(data.error || '出错了');
                    return;
                }

                idiomInput.value = '';
                emptyState.style.display = 'none';

                // ✅ 这里修复了字段不匹配问题
                addMessage(idiom, true);
                addMessage(data.ai_response, false);

                currentIdiomEl.textContent = data.current_idiom;
                updateHistoryCount();

            } catch (error) {
                showError('网络错误，请检查后端服务');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
                idiomInput.focus();
            }
        }

        // 重新开始
        async function restartGame() {
            try {
                const response = await fetch(`${API_BASE}/api/restart`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (data.success) {
                    chatArea.innerHTML = `
                        <div class="empty-state" id="emptyState">
                            <div class="icon">📜</div>
                            <p>输入一个成语开始接龙吧</p>
                        </div>
                    `;
                    currentIdiomEl.textContent = data.current_idiom;
                    historyCount.textContent = '';
                    idiomInput.value = '';
                    idiomInput.focus();
                }
            } catch (error) {
                showError('网络错误');
            }
        }

        // 回车发送
        idiomInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendIdiom();
        });

        // 限制中文输入
        idiomInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^\u4e00-\u9fa5]/g, '');
        });

        // 初始化
        loadStatus();
    </script>
</body>
</html>
